name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            args: ""
            rust_targets: ""
            artifact-name: ProtoHub-windows
            artifact-path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - platform: linux
            os: ubuntu-22.04
            args: ""
            rust_targets: ""
            artifact-name: ProtoHub-linux
            artifact-path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
          - platform: macos-arm64
            os: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
            artifact-name: ProtoHub-macos-arm64
            artifact-path: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          - platform: macos-x64
            os: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
            artifact-name: ProtoHub-macos-x64
            artifact-path: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      # GitHub Actions artifacts are always downloaded as ZIP archives. For tag
      # builds, publish the native installers as individual GitHub Release assets.
      - name: Build and publish release installers
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ProtoHub ${{ github.ref_name }}
          releaseBody: Download the installer for your operating system below.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"

      - name: Build app
        if: github.event_name == 'workflow_dispatch'
        run: npm run tauri build -- ${{ matrix.args }}

      # Manual runs are for CI verification. GitHub necessarily wraps workflow
      # artifacts in ZIP files; tagged releases above expose .dmg/.exe/.msi/etc.
      - name: Upload bundles for manual build
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
